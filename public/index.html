<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>学生成绩排名统计</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0f1a;
      --bg-card: #111827;
      --bg-card-hover: #1a2332;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent-gold: #d4a853;
      --accent-gold-light: #e8c87a;
      --accent-copper: #c9a66b;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --border-accent: rgba(212, 168, 83, 0.3);
      --rank-gold: #d4a853;
      --rank-silver: #a8b4c4;
      --rank-bronze: #c4825a;
      --shadow-luxury: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg-deep);
      min-height: 100vh;
      color: var(--text-primary);
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(212, 168, 83, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(17, 24, 39, 0.9) 0%, transparent 50%),
        linear-gradient(180deg, #0a0f1a 0%, #0d1420 100%);
      pointer-events: none;
      z-index: 0;
    }

    .app-container {
      display: flex;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    /* 左侧边栏 */
    .sidebar {
      width: 280px;
      background: var(--bg-card);
      border-right: 1px solid var(--border-subtle);
      padding: 24px 0;
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 0 24px 24px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 16px;
    }

    .sidebar-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .sidebar-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .year-list {
      flex: 1;
      overflow-y: auto;
    }

    .year-item {
      padding: 16px 24px;
      cursor: pointer;
      transition: all 0.25s ease;
      border-left: 3px solid transparent;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .year-item:hover {
      background: var(--bg-card-hover);
    }

    .year-item.active {
      background: rgba(212, 168, 83, 0.1);
      border-left-color: var(--accent-gold);
    }

    .year-item .year-label {
      font-size: 15px;
      font-weight: 500;
      color: var(--text-primary);
    }

    .year-item.active .year-label {
      color: var(--accent-gold);
    }

    .year-item .year-arrow {
      opacity: 0;
      transition: opacity 0.25s ease;
      color: var(--accent-gold);
    }

    .year-item.active .year-arrow {
      opacity: 1;
    }

    /* 右侧内容 */
    .main-content {
      flex: 1;
      padding: 32px 40px;
      overflow-y: auto;
    }

    .content-header {
      margin-bottom: 32px;
    }

    .content-title {
      font-family: 'Noto Serif SC', serif;
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 8px;
    }

    .content-title::after {
      content: '';
      display: block;
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent-gold), transparent);
      margin-top: 12px;
    }

    .stats-summary {
      display: flex;
      gap: 24px;
      margin-top: 20px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .stat-label {
      color: var(--text-muted);
      font-size: 13px;
    }

    .stat-value {
      color: var(--accent-gold);
      font-weight: 600;
      font-family: 'JetBrains Mono', monospace;
    }

    /* 班级筛选 */
    .class-filters {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .filter-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .filter-btn:hover {
      border-color: var(--text-secondary);
      color: var(--text-secondary);
    }

    .filter-btn.active {
      background: var(--accent-gold);
      border-color: var(--accent-gold);
      color: #0a0f1a;
    }

    /* 表格 */
    .table-container {
      background: var(--bg-card);
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border-subtle);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: rgba(0, 0, 0, 0.2);
    }

    th {
      padding: 14px 20px;
      text-align: left;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-subtle);
    }

    th:first-child {
      width: 80px;
    }

    th:nth-child(4),
    th:nth-child(5) {
      width: 100px;
      text-align: center;
    }

    td {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border-subtle);
    }

    tr:last-child td {
      border-bottom: none;
    }

    tbody tr {
      transition: background 0.2s;
    }

    tbody tr:hover {
      background: var(--bg-card-hover);
    }

    .rank-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-secondary);
      border: 1px solid var(--border-subtle);
    }

    .rank-badge.gold {
      background: linear-gradient(135deg, var(--rank-gold) 0%, #b8923d 100%);
      color: #0a0f1a;
      border-color: var(--rank-gold);
    }

    .rank-badge.silver {
      background: linear-gradient(135deg, var(--rank-silver) 0%, #8899ad 100%);
      color: #0a0f1a;
      border-color: var(--rank-silver);
    }

    .rank-badge.bronze {
      background: linear-gradient(135deg, var(--rank-bronze) 0%, #a66b48 100%);
      color: #0a0f1a;
      border-color: var(--rank-bronze);
    }

    .student-name {
      font-weight: 500;
      color: var(--text-primary);
    }

    .class-cell {
      color: var(--text-secondary);
      font-size: 13px;
    }

    .score-cell {
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 15px;
    }

    .score-high {
      color: #4ade80;
    }

    .score-mid {
      color: var(--accent-gold);
    }

    .score-low {
      color: #f87171;
    }

    .ranking-cell {
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 80px 40px;
      color: var(--text-muted);
    }

    .empty-state svg {
      width: 64px;
      height: 64px;
      margin-bottom: 20px;
      opacity: 0.3;
    }

    .empty-state p {
      font-size: 15px;
    }

    /* 加载状态 */
    .loading-state {
      text-align: center;
      padding: 60px 40px;
      color: var(--text-muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 2px solid var(--border-subtle);
      border-top-color: var(--accent-gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 响应式 */
    @media (max-width: 768px) {
      .app-container {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        flex-direction: row;
        align-items: center;
        padding: 16px;
        border-right: none;
        border-bottom: 1px solid var(--border-subtle);
      }

      .sidebar-header {
        padding: 0;
        margin-bottom: 0;
        margin-right: 24px;
        border-bottom: none;
        border-right: 1px solid var(--border-subtle);
        padding-right: 24px;
      }

      .sidebar-title {
        font-size: 1rem;
        margin-bottom: 0;
      }

      .sidebar-subtitle {
        display: none;
      }

      .year-list {
        display: flex;
        overflow-x: auto;
        gap: 8px;
      }

      .year-item {
        padding: 8px 16px;
        border-left: none;
        border-radius: 20px;
        white-space: nowrap;
        border: 1px solid var(--border-subtle);
      }

      .year-item.active {
        border-left: none;
        border-color: var(--accent-gold);
      }

      .year-item .year-arrow {
        display: none;
      }

      .main-content {
        padding: 24px 16px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-container">
      <!-- 左侧边栏 -->
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-title">成绩统计</div>
          <div class="sidebar-subtitle">Academic Rankings</div>
        </div>
        <div class="year-list">
          <div 
            v-for="year in years" 
            :key="year"
            class="year-item"
            :class="{ active: selectedYear === year }"
            @click="selectYear(year)"
          >
            <span class="year-label">{{ year }} 学年</span>
            <span class="year-arrow">›</span>
          </div>
        </div>
      </aside>

      <!-- 右侧内容 -->
      <main class="main-content">
        <template v-if="selectedYear">
          <div class="content-header">
            <h1 class="content-title">{{ selectedYear }} 学年成绩排名</h1>
            <div class="stats-summary">
              <div class="stat-item">
                <span class="stat-label">总人数</span>
                <span class="stat-value">{{ displayData.length }}</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">班级数</span>
                <span class="stat-value">{{ classCount }}</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">平均分</span>
                <span class="stat-value">{{ averageScore }}</span>
              </div>
            </div>
          </div>

          <div class="class-filters">
            <button 
              class="filter-btn" 
              :class="{ active: currentClass === null }"
              @click="currentClass = null"
            >全部</button>
            <button 
              v-for="cls in classes" 
              :key="cls"
              class="filter-btn"
              :class="{ active: currentClass === cls }"
              @click="currentClass = cls"
            >{{ cls }}</button>
          </div>

          <div class="table-container">
            <table>
              <thead>
                <tr>
                  <th>排名</th>
                  <th>学生姓名</th>
                  <th>班级</th>
                  <th>成绩</th>
                  <th>班级排名</th>
                </tr>
              </thead>
              <tbody>
                <tr v-if="loading">
                  <td colspan="5">
                    <div class="loading-state">
                      <div class="spinner"></div>
                      <div>加载中...</div>
                    </div>
                  </td>
                </tr>
                <tr v-else-if="error">
                  <td colspan="5">
                    <div class="loading-state" style="color: #ef4444;">{{ error }}</div>
                  </td>
                </tr>
                <tr 
                  v-else 
                  v-for="item in displayData" 
                  :key="item.studentName + item.className"
                >
                  <td>
                    <span class="rank-badge" :class="getRankClass(item.total_ranking)">
                      {{ item.total_ranking }}
                    </span>
                  </td>
                  <td class="student-name">{{ item.studentName }}</td>
                  <td class="class-cell">{{ item.className }}</td>
                  <td class="score-cell" :class="getScoreClass(item.score)">{{ item.score }}</td>
                  <td class="ranking-cell">#{{ item.class_ranking }}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </template>

        <div v-else class="empty-state">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M9 12h6m-3-3v6m-7 4h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <p>请选择左侧学年查看成绩排名</p>
        </div>
      </main>
    </div>
  </div>

  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script>
    const { createApp, ref, computed } = Vue;

    createApp({
      setup() {
        const classes = ['classA', 'classB', 'classC', 'classD', 'classE', 'classF', 'classG'];
        
        const years = ref([]);
        const selectedYear = ref(null);
        const currentData = ref(null);
        const currentClass = ref(null);
        const loading = ref(false);
        const error = ref('');

        const classCount = computed(() => {
          if (!currentData.value) return 0;
          const classSet = new Set(currentData.value.statistics.map(s => s.className));
          return classSet.size;
        });

        const averageScore = computed(() => {
          if (!currentData.value || currentData.value.statistics.length === 0) return 0;
          const total = currentData.value.statistics.reduce((sum, s) => sum + s.score, 0);
          return Math.round(total / currentData.value.statistics.length);
        });

        const displayData = computed(() => {
          if (!currentData.value) return [];
          if (currentClass.value === null) {
            return currentData.value.statistics;
          }
          return currentData.value.statistics.filter(s => s.className === currentClass.value);
        });

        async function loadYears() {
          try {
            const response = await fetch('/api/years');
            const data = await response.json();
            years.value = data.sort((a, b) => b - a);
          } catch (e) {
            console.error('加载年份失败:', e);
          }
        }

        async function selectYear(year) {
          selectedYear.value = year;
          loading.value = true;
          error.value = '';
          currentClass.value = null;

          try {
            const response = await fetch(`/api/statistics/${year}`);
            const data = await response.json();
            
            if (data.error) {
              error.value = data.error;
            } else {
              currentData.value = data;
            }
          } catch (e) {
            error.value = '请求失败: ' + e.message;
          } finally {
            loading.value = false;
          }
        }

        function getRankClass(rank) {
          if (rank === 1) return 'gold';
          if (rank === 2) return 'silver';
          if (rank === 3) return 'bronze';
          return '';
        }

        function getScoreClass(score) {
          if (score >= 90) return 'score-high';
          if (score >= 60) return 'score-mid';
          return 'score-low';
        }

        loadYears();

        return {
          classes,
          years,
          selectedYear,
          currentClass,
          loading,
          error,
          classCount,
          averageScore,
          displayData,
          selectYear,
          getRankClass,
          getScoreClass
        };
      }
    }).mount('#app');
  </script>
</body>
</html>
